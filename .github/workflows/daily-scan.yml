name: Daily NSE Scan

on:
  schedule:
    # 03:45 UTC = 09:15 IST, Monday-Friday (Morning scan at market open)
    - cron: "45 3 * * 1-5"
    # 10:15 UTC = 15:45 IST, Monday-Friday (Evening follow-up at EOD)
    - cron: "15 10 * * 1-5"
    # Hourly scans at 04:45-09:45 UTC = 10:15-15:15 IST, Monday-Friday
    - cron: "45 4 * * 1-5"
    - cron: "45 5 * * 1-5"
    - cron: "45 6 * * 1-5"
    - cron: "45 7 * * 1-5"
    - cron: "45 8 * * 1-5"
    - cron: "45 9 * * 1-5"
  workflow_dispatch:
    inputs:
      run_type:
        description: "Which scan to run"
        required: false
        default: "morning"
        type: choice
        options:
          - morning
          - midday
          - evening
          - hourly

permissions:
  contents: read

jobs:
  run-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare runtime folders
        run: |
          mkdir -p logs output .github/secrets
          {
            echo "Daily NSE Scan workflow started"
            echo "Event: ${{ github.event_name }}"
            echo "Schedule: ${{ github.event.schedule || 'n/a' }}"
            echo "Ref: ${{ github.ref_name }}"
          } > logs/github-actions.log
          # Record runner timestamps for debugging scheduling/timezone issues
          echo "UTC now: $(date -u)" >> logs/github-actions.log
          echo "IST now: $(TZ=Asia/Kolkata date)" >> logs/github-actions.log

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip 2>&1 | tee -a logs/github-actions.log
          pip install -r requirements.txt 2>&1 | tee -a logs/github-actions.log
          test ${PIPESTATUS[0]} -eq 0

      - name: Create credentials file from secret
        env:
          CREDS_1: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS }}
          CREDS_2: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
        run: |
          set -euo pipefail
          FINAL_CREDS="${CREDS_1:-$CREDS_2}"
          if [ -z "$FINAL_CREDS" ]; then
            echo "Missing secret: GOOGLE_APPLICATION_CREDENTIALS or JSON" | tee -a logs/github-actions.log
            exit 1
          fi
          printf "%s" "$FINAL_CREDS" > .github/secrets/google-service-account.json
          python -m json.tool .github/secrets/google-service-account.json > /dev/null 2>> logs/github-actions.log
          echo "Credentials JSON validated successfully" >> logs/github-actions.log

      - name: Run morning scanner or evening follow-up
        env:
          GOOGLE_SHEET_URL: ${{ secrets.GOOGLE_SHEET_URL }}
          GOOGLE_SHEET_KEY: ${{ secrets.GOOGLE_SHEET_KEY }}
          GOOGLE_APPLICATION_CREDENTIALS: .github/secrets/google-service-account.json
        run: |
          set -euo pipefail
          if [ -z "$GOOGLE_SHEET_URL" ] && [ -z "${GOOGLE_SHEET_KEY:-}" ]; then
            echo "Missing secret: GOOGLE_SHEET_URL or GOOGLE_SHEET_KEY" | tee -a logs/github-actions.log
            exit 1
          fi
          echo "Google Sheet Target is present" >> logs/github-actions.log

          # For scheduled runs, determine type from cron. For manual runs, use the input.
          if [ "${{ github.event_name }}" = "schedule" ]; then
            SCHEDULE="${{ github.event.schedule || '' }}"
            echo "Detected schedule string: $SCHEDULE" >> logs/github-actions.log
            # Use awk to reliably get the minute and hour fields from the cron string
            SCHEDULE_MIN=$(echo "$SCHEDULE" | awk '{print $1}')
            SCHEDULE_HOUR=$(echo "$SCHEDULE" | awk '{print $2}')
            echo "Schedule minute: $SCHEDULE_MIN; hour field: $SCHEDULE_HOUR" >> logs/github-actions.log
            if [ "$SCHEDULE_MIN" = "15" ] && [ "$SCHEDULE_HOUR" = "10" ]; then
              RUN_TYPE="evening"
            elif [ "$SCHEDULE_MIN" = "45" ] && [ "$SCHEDULE_HOUR" = "3" ]; then
              RUN_TYPE="morning"
            elif [ "$SCHEDULE_MIN" = "28" ] || ( [ "$SCHEDULE_MIN" = "45" ] && [ "$SCHEDULE_HOUR" -ge 4 ] && [ "$SCHEDULE_HOUR" -le 9 ] ); then
              RUN_TYPE="hourly"
            else
              # Fallback: if minute is 45 and hour falls into expected UTC market window, treat as hourly
              if [ "$SCHEDULE_MIN" = "45" ] && [ "$SCHEDULE_HOUR" -ge 4 ] && [ "$SCHEDULE_HOUR" -le 9 ]; then
                RUN_TYPE="hourly"
              else
                RUN_TYPE="morning"
              fi
            fi
          else
            RUN_TYPE="${{ inputs.run_type || 'morning' }}"
          fi
          echo "Executing scanner with run-type: $RUN_TYPE" >> logs/github-actions.log
          python main.py --sync-gsheet --plain --watchlist NIFTY500 --run-type "$RUN_TYPE" 2>&1 | tee -a logs/github-actions.log
          test ${PIPESTATUS[0]} -eq 0

      - name: Dump GitHub scheduled event payload (debug)
        if: ${{ github.event_name == 'schedule' }}
        run: |
          echo '--- GITHUB EVENT PAYLOAD ---' >> logs/github-actions.log
          echo '${{ toJson(github.event) }}' >> logs/github-actions.log

      - name: Upload scan output artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nse-scan-output
          path: |
            logs/github-actions.log
            output/buy_signals.csv
            output/buy_signals.json
            logs/scanner.log
          if-no-files-found: warn
