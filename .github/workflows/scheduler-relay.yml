name: Scheduler Relay

on:
  schedule:
    # Poll every 5 minutes on weekdays and dispatch due slots in IST.
    - cron: "*/5 3-10 * * 1-5"
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  dispatch-due-slot:
    runs-on: ubuntu-latest
    steps:
      - name: Determine due run type in IST
        id: slot
        run: |
          set -euo pipefail
          IST_HOUR=$(TZ=Asia/Kolkata date +"%H")
          IST_MIN=$(TZ=Asia/Kolkata date +"%M")
          IST_DATE=$(TZ=Asia/Kolkata date +"%Y-%m-%d")
          IST_NOW=$(TZ=Asia/Kolkata date +"%Y-%m-%d %H:%M:%S %Z")
          HOUR_NUM=$((10#$IST_HOUR))
          MIN_NUM=$((10#$IST_MIN))

          RUN_TYPE=""
          SLOT_START_IST=""

          # Morning slot: from 09:15 until before 10:15. Backfill if missed.
          if [ "$HOUR_NUM" -eq 9 ] && [ "$MIN_NUM" -ge 15 ]; then
            RUN_TYPE="morning"
            SLOT_START_IST="$IST_DATE 09:15:00"
          # Evening slot: from 15:45 onwards (allow into 16:xx for delayed execution).
          elif { [ "$HOUR_NUM" -eq 15 ] && [ "$MIN_NUM" -ge 45 ]; } || [ "$HOUR_NUM" -eq 16 ]; then
            RUN_TYPE="evening"
            SLOT_START_IST="$IST_DATE 15:45:00"
          # Hourly slot: 10:15..14:59 and final slot 15:15..15:44.
          elif [ "$HOUR_NUM" -ge 10 ] && [ "$HOUR_NUM" -le 14 ] && [ "$MIN_NUM" -ge 15 ]; then
            RUN_TYPE="hourly"
            SLOT_START_IST="$IST_DATE ${IST_HOUR}:15:00"
          elif [ "$HOUR_NUM" -eq 15 ] && [ "$MIN_NUM" -ge 15 ] && [ "$MIN_NUM" -lt 45 ]; then
            RUN_TYPE="hourly"
            SLOT_START_IST="$IST_DATE 15:15:00"
          fi

          SLOT_START_EPOCH=""
          if [ -n "$SLOT_START_IST" ]; then
            SLOT_START_EPOCH=$(TZ=Asia/Kolkata date -d "$SLOT_START_IST" +%s)
          fi

          echo "ist_now=$IST_NOW" >> "$GITHUB_OUTPUT"
          echo "run_type=$RUN_TYPE" >> "$GITHUB_OUTPUT"
          echo "slot_start_epoch=$SLOT_START_EPOCH" >> "$GITHUB_OUTPUT"

      - name: Dispatch daily scan workflow
        if: ${{ steps.slot.outputs.run_type != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_TYPE: ${{ steps.slot.outputs.run_type }}
          SLOT_START_EPOCH: ${{ steps.slot.outputs.slot_start_epoch }}
        run: |
          set -euo pipefail
          echo "IST now: ${{ steps.slot.outputs.ist_now }}"
          echo "Candidate dispatch for run_type=$RUN_TYPE"

          RUNS=$(curl -fsSL \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/daily-scan.yml/runs?per_page=50")

          EXISTING_COUNT=$(printf '%s' "$RUNS" | jq --argjson slot "$SLOT_START_EPOCH" '[
            .workflow_runs[]
            | select((.created_at | fromdateiso8601) >= $slot)
            | select(.status == "queued" or .status == "in_progress" or .status == "completed")
          ] | length')

          if [ "$EXISTING_COUNT" -gt 0 ]; then
            echo "A Daily NSE Scan run already exists for this slot window. Skipping dispatch."
            exit 0
          fi

          echo "Dispatching Daily NSE Scan with run_type=$RUN_TYPE"

          curl -fsSL -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/daily-scan.yml/dispatches" \
            -d "{\"ref\":\"main\",\"inputs\":{\"run_type\":\"$RUN_TYPE\"}}"

      - name: No slot due
        if: ${{ steps.slot.outputs.run_type == '' }}
        run: |
          echo "IST now: ${{ steps.slot.outputs.ist_now }}"
          echo "No market slot due in this 5-minute window."