name: Scheduler Relay

on:
  schedule:
    # Poll every 5 minutes on weekdays and dispatch due slots in IST.
    - cron: "*/5 3-10 * * 1-5"
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  dispatch-due-slot:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch due slot
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          IST_HOUR=$(TZ=Asia/Kolkata date +"%H")
          IST_MIN=$(TZ=Asia/Kolkata date +"%M")
          IST_DATE=$(TZ=Asia/Kolkata date +"%Y-%m-%d")
          IST_NOW=$(TZ=Asia/Kolkata date +"%Y-%m-%d %H:%M:%S %Z")
          HOUR_NUM=$((10#$IST_HOUR))
          MIN_NUM=$((10#$IST_MIN))
          NOW_EPOCH=$(date +%s)

          MORNING_START=$(TZ=Asia/Kolkata date -d "$IST_DATE 09:15:00" +%s)
          MORNING_END=$(TZ=Asia/Kolkata date -d "$IST_DATE 10:15:00" +%s)
          MORNING_CATCHUP_END=$(TZ=Asia/Kolkata date -d "$IST_DATE 12:30:00" +%s)
          EVENING_START=$(TZ=Asia/Kolkata date -d "$IST_DATE 15:45:00" +%s)

          echo "IST now: $IST_NOW"

          RUNS=$(curl -fsSL \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/daily-scan.yml/runs?per_page=50")

          count_runs() {
            local start_epoch="$1"
            local end_epoch="$2"
            printf '%s' "$RUNS" | jq --argjson start "$start_epoch" --argjson end "$end_epoch" '[
              .workflow_runs[]
              | select((.created_at | fromdateiso8601) >= $start)
              | select((.created_at | fromdateiso8601) < $end)
              | select(.status == "queued" or .status == "in_progress" or .status == "completed")
            ] | length'
          }

          RUN_TYPE=""
          SLOT_START_EPOCH=""
          SLOT_END_EPOCH=""

          MORNING_COUNT=$(count_runs "$MORNING_START" "$MORNING_END")
          if [ "$NOW_EPOCH" -ge "$MORNING_START" ] && [ "$NOW_EPOCH" -lt "$MORNING_CATCHUP_END" ] && [ "$MORNING_COUNT" -eq 0 ]; then
            RUN_TYPE="morning"
            SLOT_START_EPOCH="$MORNING_START"
            SLOT_END_EPOCH="$MORNING_END"
          elif [ "$NOW_EPOCH" -ge "$EVENING_START" ]; then
            EVENING_END=$(TZ=Asia/Kolkata date -d "$IST_DATE 17:00:00" +%s)
            EVENING_COUNT=$(count_runs "$EVENING_START" "$EVENING_END")
            if [ "$EVENING_COUNT" -eq 0 ]; then
              RUN_TYPE="evening"
              SLOT_START_EPOCH="$EVENING_START"
              SLOT_END_EPOCH="$EVENING_END"
            fi
          elif [ "$HOUR_NUM" -ge 10 ] && [ "$HOUR_NUM" -le 14 ] && [ "$MIN_NUM" -ge 15 ]; then
            HOURLY_START=$(TZ=Asia/Kolkata date -d "$IST_DATE ${IST_HOUR}:15:00" +%s)
            HOURLY_END=$(TZ=Asia/Kolkata date -d "$IST_DATE ${IST_HOUR}:59:59" +%s)
            HOURLY_COUNT=$(count_runs "$HOURLY_START" "$HOURLY_END")
            if [ "$HOURLY_COUNT" -eq 0 ]; then
              RUN_TYPE="hourly"
              SLOT_START_EPOCH="$HOURLY_START"
              SLOT_END_EPOCH="$HOURLY_END"
            fi
          elif [ "$HOUR_NUM" -eq 15 ] && [ "$MIN_NUM" -ge 15 ] && [ "$MIN_NUM" -lt 45 ]; then
            HOURLY_START=$(TZ=Asia/Kolkata date -d "$IST_DATE 15:15:00" +%s)
            HOURLY_END=$(TZ=Asia/Kolkata date -d "$IST_DATE 15:44:59" +%s)
            HOURLY_COUNT=$(count_runs "$HOURLY_START" "$HOURLY_END")
            if [ "$HOURLY_COUNT" -eq 0 ]; then
              RUN_TYPE="hourly"
              SLOT_START_EPOCH="$HOURLY_START"
              SLOT_END_EPOCH="$HOURLY_END"
            fi
          fi

          if [ -z "$RUN_TYPE" ]; then
            echo "No market slot due in this window."
            exit 0
          fi

          echo "Candidate dispatch for run_type=$RUN_TYPE"

          EXISTING_COUNT=$(count_runs "$SLOT_START_EPOCH" "$SLOT_END_EPOCH")
          if [ "$EXISTING_COUNT" -gt 0 ]; then
            echo "A Daily NSE Scan run already exists for this slot window. Skipping dispatch."
            exit 0
          fi

          echo "Dispatching Daily NSE Scan with run_type=$RUN_TYPE"

          curl -fsSL -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/daily-scan.yml/dispatches" \
            -d "{\"ref\":\"main\",\"inputs\":{\"run_type\":\"$RUN_TYPE\"}}"